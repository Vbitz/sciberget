name: Build app

on:
  workflow_call:
    inputs:
      application:
        required: true
        type: string
      push:
        required: false
        type: boolean
        default: true
      build_sif:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      application:
        description: Recipe name
        required: true
        type: string
      push:
        description: Push Docker image to GHCR
        required: false
        type: boolean
        default: false
      build_sif:
        description: Build Apptainer SIF
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      APPLICATION: ${{ inputs.application || github.event.inputs.application }}
      PUSH_IMAGE: ${{ inputs.push || github.event.inputs.push || false }}
      BUILD_SIF: ${{ inputs.build_sif || github.event.inputs.build_sif || true }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install builder
        run: python -m pip install -e .
      - name: Generate Dockerfile and release metadata
        run: python builder/build.py generate "$APPLICATION" --recreate --generate-release
      - name: Derive image name
        id: image
        run: |
          version="$(python -c 'import os, yaml; print(yaml.safe_load(open(f"recipes/{os.environ[\"APPLICATION\"]}/build.yaml"))["version"])')"
          image="$(echo "${APPLICATION}_${version}" | tr '[:upper:]' '[:lower:]')"
          ref="ghcr.io/${GITHUB_REPOSITORY}/${image}:latest"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v4
        if: env.PUSH_IMAGE == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        run: |
          docker buildx build "build/${APPLICATION}" \
            --file "build/${APPLICATION}/${{ steps.image.outputs.image }}.Dockerfile" \
            --tag "ghcr.io/${GITHUB_REPOSITORY}/${{ steps.image.outputs.image }}:${GITHUB_SHA::12}" \
            --tag "ghcr.io/${GITHUB_REPOSITORY}/${{ steps.image.outputs.image }}:latest" \
            $([[ "${PUSH_IMAGE}" == "true" ]] && echo "--push" || echo "--load")
      - uses: ./.github/actions/setup-apptainer
        if: env.BUILD_SIF == 'true'
        with:
          apptainer-version: 1.4.3
      - name: Build SIF
        if: env.BUILD_SIF == 'true'
        run: |
          mkdir -p sifs
          if [[ "${PUSH_IMAGE}" == "true" ]]; then
            source_ref="docker://${{ steps.image.outputs.ref }}"
          else
            source_ref="docker-daemon://${{ steps.image.outputs.ref }}"
          fi
          apptainer build "sifs/${{ steps.image.outputs.image }}_${GITHUB_SHA::12}.simg" \
            "${source_ref}"
      - uses: actions/upload-artifact@v4
        if: env.BUILD_SIF == 'true'
        with:
          name: ${{ steps.image.outputs.image }}-sif
          path: sifs/*.simg
