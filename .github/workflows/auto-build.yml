name: Auto build

on:
  workflow_dispatch:
    inputs:
      all:
        description: Build all tool recipes
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "builder/**"

permissions:
  contents: write
  packages: write

jobs:
  changed-recipes:
    runs-on: ubuntu-24.04
    outputs:
      apps: ${{ steps.find.outputs.apps }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: find
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.all }}" == "true" ]]; then
            apps="$(find recipes -mindepth 2 -maxdepth 2 -name build.yaml \
              | cut -d/ -f2 \
              | grep -Ev '^(sciberget-cvmfs-server|sciberget-desktop)$' \
              | sort -u | jq -R . | jq -sc .)"
          else
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
              base="HEAD~1"
            fi
            apps="$(git diff --name-only "$base" HEAD -- 'recipes/*/build.yaml' \
              | cut -d/ -f2 \
              | grep -Ev '^(sciberget-cvmfs-server|sciberget-desktop)$' \
              | sort -u | jq -R . | jq -sc .)"
          fi
          [[ "$apps" == "[]" ]] && apps='["nmap"]'
          echo "apps=${apps}" >> "$GITHUB_OUTPUT"
  build:
    needs: changed-recipes
    strategy:
      fail-fast: false
      matrix:
        application: ${{ fromJSON(needs.changed-recipes.outputs.apps) }}
    uses: ./.github/workflows/build-app.yml
    with:
      application: ${{ matrix.application }}
      push: true
    secrets: inherit
