name: Build desktop

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push image to GHCR
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "recipes/sciberget-desktop/**"
      - "config/**"
      - "command/**"
      - "apps.json"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install builder
        run: python -m pip install -e .
      - name: Generate desktop Dockerfile
        run: python builder/build.py generate sciberget-desktop --recreate
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name == 'push' || inputs.push
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: build/sciberget-desktop
          file: build/sciberget-desktop/sciberget-desktop_0.1.0.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: |
            ghcr.io/${{ github.repository }}/sciberget-desktop:latest
            ghcr.io/${{ github.repository }}/sciberget-desktop:${{ github.sha }}
