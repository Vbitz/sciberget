name: hydra
version: "rolling"

architectures:
  - x86_64

categories:
  - password attacks

build:
  kind: neurodocker
  base-image: kalilinux/kali-rolling:latest
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install:
        - ca-certificates
        - hydra
    - run:
        - command -v hydra
        - apt-get clean
        - rm -rf /var/lib/apt/lists/*

deploy:
  bins:
    - hydra
    - pw-inspector

readme: |
  ## hydra/{{ context.version }}

  Network login assessment tool from Kali Linux.

