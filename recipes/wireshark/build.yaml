name: wireshark
version: "rolling"

architectures:
  - x86_64

categories:
  - sniffing spoofing

gui_apps:
  - name: wiresharkGUI
    exec: wireshark

build:
  kind: neurodocker
  base-image: kalilinux/kali-rolling:latest
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - run:
        - printf 'wireshark-common wireshark-common/install-setuid boolean false\n' | debconf-set-selections
    - install:
        - ca-certificates
        - wireshark
        - tshark
    - run:
        - command -v wireshark
        - command -v tshark
        - command -v dumpcap
        - apt-get clean
        - rm -rf /var/lib/apt/lists/*

deploy:
  bins:
    - wireshark
    - tshark
    - dumpcap

readme: |
  ## wireshark/{{ context.version }}

  Network protocol analyzer from Kali Linux.

