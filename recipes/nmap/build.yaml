name: nmap
version: "7.95"

architectures:
  - x86_64

categories:
  - information gathering

build:
  kind: neurodocker
  base-image: kalilinux/kali-rolling:latest
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install:
        - ca-certificates
        - nmap
    - run:
        - command -v nmap
        - apt-get clean
        - rm -rf /var/lib/apt/lists/*

deploy:
  bins:
    - nmap

readme: |
  ## nmap/{{ context.version }}

  Network discovery and security auditing suite from Kali Linux.

  Examples:
  ```
  nmap --version
  nmap -sV 127.0.0.1
  ```
