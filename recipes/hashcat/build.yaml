name: hashcat
version: "rolling"

architectures:
  - x86_64

categories:
  - password attacks

build:
  kind: neurodocker
  base-image: kalilinux/kali-rolling:latest
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install:
        - ca-certificates
        - hashcat
    - run:
        - command -v hashcat
        - apt-get clean
        - rm -rf /var/lib/apt/lists/*

deploy:
  bins:
    - hashcat

readme: |
  ## hashcat/{{ context.version }}

  Password recovery and hash auditing tool from Kali Linux. GPU use depends on
  the host runtime and drivers exposed to Apptainer.

