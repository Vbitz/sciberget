name: ghidra
version: "rolling"

architectures:
  - x86_64

categories:
  - reverse engineering

gui_apps:
  - name: ghidraGUI
    exec: ghidra

build:
  kind: neurodocker
  base-image: kalilinux/kali-rolling:latest
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install:
        - ca-certificates
        - ghidra
    - run:
        - command -v ghidra
        - apt-get clean
        - rm -rf /var/lib/apt/lists/*

deploy:
  bins:
    - ghidra

readme: |
  ## ghidra/{{ context.version }}

  Reverse engineering suite from Kali Linux.

