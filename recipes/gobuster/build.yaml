name: gobuster
version: "rolling"

architectures:
  - x86_64

categories:
  - web applications

build:
  kind: neurodocker
  base-image: kalilinux/kali-rolling:latest
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install:
        - ca-certificates
        - gobuster
    - run:
        - command -v gobuster
        - apt-get clean
        - rm -rf /var/lib/apt/lists/*

deploy:
  bins:
    - gobuster

readme: |
  ## gobuster/{{ context.version }}

  Directory, DNS, vhost and object storage brute forcing tool from Kali Linux.

